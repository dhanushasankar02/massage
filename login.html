<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Login - Zenith Wellness</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="fontawesome/fontawesome-free-6.0.0-web/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    /* LIGHT MODE (default) */
    :root {
      --bg-body: #f5f9f7;
      --bg-surface: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #122c24;
      --text-secondary: #4a635a;
      --accent: #1e6b54;
      --accent-light: #d8ede4;
      --border: #dfeae4;
      --shadow-sm: 0 8px 20px rgba(18, 44, 36, 0.04), 0 2px 6px rgba(18, 44, 36, 0.03);
      --shadow-lg: 0 15px 35px rgba(0, 0, 0, 0.1);
      --accent-text: #ffffff;
      --navbar-bg: #ffffff;
      --input-bg: #fdfdfd;
      --link-hover: #144f3d;
    }

    body.dark-mode {
      --bg-body: #0a1411;
      --bg-surface: #11201b;
      --bg-card: #182c26;
      --text-primary: #f0f7f4;
      --text-secondary: #a3bdae;
      --accent: #4dd0a8;
      --accent-light: #1c4d3f;
      --border: #243e35;
      --accent-text: #051410;
      --navbar-bg: #0d1a16;
      --input-bg: #2a2a2a;
      --shadow-sm: 0 8px 20px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 15px 35px rgba(0, 0, 0, 0.5);
      --link-hover: #7af2cc;
    }

    body {
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    h1, h2, h3, h4, h5, h6 {
      font-weight: 600;
    }
    p {
      font-weight: 450;
    }

    /* Minimal Header */
    .login-header {
      padding: 0;
      position: fixed;
      top: 1rem;
      right: 2rem;
      left: auto !important;
      width: auto !important;
      z-index: 100;
      background: transparent;
    }
    html[dir="rtl"] .login-header {
      right: auto !important;
      left: 2rem !important;
    }

    /* Logo area (identical to index.html) */
    .logo {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      white-space: nowrap;
    }
    .logo-mark {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
      color: var(--accent-text);
      font-size: 1rem;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(155, 123, 92, 0.2);
    }
    .logo-text {
      font-size: 1.15rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 12px;
    }
    .icon-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }
    .icon-btn:hover {
      background: var(--accent-light);
      border-color: var(--accent);
      color: #1e2a2e;
    }

    /* Main Login Area */
    .login-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: radial-gradient(circle at top right, rgba(155,123,92,0.05), transparent 40%),
                  radial-gradient(circle at bottom left, rgba(155,123,92,0.05), transparent 40%);
    }

    .login-card {
      background: var(--bg-card);
      width: 100%;
      max-width: 450px;
      border-radius: 20px;
      padding: 1.5rem;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    .login-header-text {
      text-align: center;
      margin-bottom: 0.5rem;
    }
    .login-header-text h1 {
      font-size: 1.75rem;
      color: var(--text-primary);
      margin-bottom: 0.2rem;
    }
    .login-header-text p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 0.5rem;
      position: relative;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text-primary);
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1.1rem;
      opacity: 0.7;
    }
    .form-control {
      display: block;
      width: 100%;
      padding: 0.5rem 1rem 0.5rem 2.5rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(155, 123, 92, 0.1);
    }
    
    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      opacity: 0.7;
    }
    .password-toggle:hover {
      opacity: 1;
      color: var(--accent);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .forgot-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-login {
      width: 100%;
      padding: 0.8rem;
      background: var(--accent);
      color: var(--accent-text);
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      transition: background 0.3s, transform 0.2s;
    }
    .btn-login:hover {
      background: var(--link-hover);
      transform: translateY(-2px);
    }

    .register-link {
      text-align: center;
      margin-top: 1rem;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    .register-link a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
      margin-left: 0.3rem;
    }
    .register-link a:hover {
      text-decoration: underline;
    }

    /* Social Login */
    .social-login-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1rem 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .social-login-divider::before,
    .social-login-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border);
    }
    .social-login-divider:not(:empty)::before { margin-right: 1em; }
    .social-login-divider:not(:empty)::after { margin-left: 1em; }

    .social-btn-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .social-btn-icon:hover {
      background: var(--bg-body);
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: var(--shadow-sm);
    }

    @media (max-width: 600px) {
      .login-header {
        flex-direction: column;
        gap: 1rem;
      }
      .login-card {
        padding: 1.5rem;
        margin-top: 4rem;
      }
    }


    /* RTL Adjustments */
    html[dir="rtl"] .login-card .logo { direction: rtl !important; }
    html[dir="rtl"] .input-icon { left: auto !important; right: 1rem !important; }
    html[dir="rtl"] .form-control { padding: 0.5rem 2.5rem 0.5rem 2.5rem !important; }
    html[dir="rtl"] .password-toggle { right: auto !important; left: 1rem !important; }
    html[dir="rtl"] .forgot-link { direction: ltr !important; display: inline-block !important; }
    html[dir="rtl"] .register-link a { margin-left: 0 !important; margin-right: 0.3rem !important; }
    html[dir="rtl"] .btn-login i { margin-left: 0 !important; margin-right: 5px !important; }
  </style>
  <link rel="stylesheet" href="responsive.css">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
</head>
<body>

  <!-- Header -->
  <header class="login-header" style="justify-content: flex-end;">
    <div class="action-buttons">
      <button class="icon-btn" id="darkModeToggle">
        <i class="fas fa-moon"></i> <span id="themeText">Dark</span>
      </button>
      <button class="icon-btn" id="rtlToggleBtn">
        <i class="fas fa-exchange-alt"></i> <span id="rtlText">RTL</span>
      </button>
    </div>
  </header>

  <!-- Login Area -->
  <main class="login-main">
    <div class="login-card">
      <div class="login-header-text">
        <div style="display: flex; justify-content: center; margin-bottom: 0.5rem;">
          <a href="./index.html" class="logo" style="display: inline-flex;">
            <img src="images/favicon.svg" alt="Zenith Logo" class="logo-mark">
            <span class="logo-text">Zenith</span>
          </a>
        </div>
        <h1>Welcome Back</h1>
        <p>Log in to access your wellness dashboard</p>
      </div>

      <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Login submitted');">
        
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" class="form-control" placeholder="hello@zenithwellness.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="password" class="form-control" placeholder="Create password" required>
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle Password Visibility">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" checked>
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login">
          Sign In <i class="fas fa-arrow-right" style="margin-left: 5px;"></i>
        </button>

        <div class="social-login-divider">Or continue with</div>

        <div style="display: flex; justify-content: center; gap: 1.5rem;">
          <button type="button" class="social-btn-icon" aria-label="Sign in with Google">
            <i class="fab fa-google" style="color: #DB4437;"></i>
          </button>
          
          <button type="button" class="social-btn-icon" aria-label="Sign in with Apple">
            <i class="fab fa-apple"></i>
          </button>
          
          <button type="button" class="social-btn-icon" aria-label="Sign in with Facebook">
            <i class="fab fa-facebook-f" style="color: #1877F2;"></i>
          </button>
        </div>

      </form>

      <div class="register-link">
        Don't have an account? <a href="./register.html">Create one</a>
      </div>
    </div>
  </main>

  <script>
    (function() {
      // Elements
      const darkToggle = document.getElementById('darkModeToggle');
      const themeText = document.getElementById('themeText');
      const rtlToggle = document.getElementById('rtlToggleBtn');
      const rtlText = document.getElementById('rtlText');
      const togglePassword = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('password');

      // Helper to safely access localStorage
      function getStorageItem(key) {
        try {
          return localStorage.getItem(key);
        } catch (e) {
          console.warn('localStorage is not accessible:', e);
          return null;
        }
      }

      function setStorageItem(key, value) {
        try {
          localStorage.setItem(key, value);
        } catch (e) {
          console.warn('localStorage set failed:', e);
        }
      }

      // --- Dark Mode Logic ---
      const isDark = getStorageItem('darkMode') === 'enabled';
      if (isDark) {
        document.body.classList.add('dark-mode');
        updateDarkButton(true);
      } else {
        updateDarkButton(false);
      }

      function updateDarkButton(darkActive) {
        if (!darkToggle) return;
        const icon = darkToggle.querySelector('i');
        if (icon) {
          icon.className = darkActive ? 'fas fa-sun' : 'fas fa-moon';
        }
        if (themeText) {
          themeText.innerText = darkActive ? 'Light' : 'Dark';
        }
      }

      if (darkToggle) {
        darkToggle.addEventListener('click', () => {
          const nowDark = document.body.classList.toggle('dark-mode');
          setStorageItem('darkMode', nowDark ? 'enabled' : 'disabled');
          updateDarkButton(nowDark);
        });
      }

      // --- RTL Logic ---
      let isRTL = getStorageItem('rtlMode') === 'enabled';
      function applyRTL(rtlActive) {
        document.documentElement.setAttribute('dir', rtlActive ? 'rtl' : 'ltr');
        if (rtlToggle) {
          rtlToggle.innerHTML = rtlActive 
            ? '<i class="fas fa-exchange-alt"></i> <span id="rtlText">LTR</span>' 
            : '<i class="fas fa-exchange-alt"></i> <span id="rtlText">RTL</span>';
        }
        setStorageItem('rtlMode', rtlActive ? 'enabled' : 'disabled');
      }
      applyRTL(isRTL);

      if (rtlToggle) {
        rtlToggle.addEventListener('click', () => {
          isRTL = !isRTL;
          applyRTL(isRTL);
        });
      }

      // --- Show/Hide Password Logic ---
      if (togglePassword && passwordInput) {
        togglePassword.addEventListener('click', function () {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
        });
      }

    })();
  </script>

<script>
    // --- Added for dynamic active state ---
    const currentPath = decodeURIComponent(window.location.pathname.split('/').pop()) || 'index.html';
    document.querySelectorAll('.nav-link, .dropdown-link').forEach(link => {
      const href = link.getAttribute('href');
      if (href && href !== '#' && href.includes(currentPath)) {
        link.classList.add('active');
        const parentLi = link.closest('li');
        if (parentLi) {
          const toggle = parentLi.querySelector('.dropdown-toggle');
          if (toggle) toggle.classList.add('active');
        }
      } else {
        link.classList.remove('active');
      }
    });
    // --- End dynamic active state ---
</script>
</body>
</html>
